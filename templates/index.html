<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodBot — Emotional AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      /* Base */
      --bg:       #080810;
      --surface:  #0f0f1a;
      --panel:    #13131f;
      --border:   rgba(255,255,255,0.07);

      /* Mood accent — overridden by JS */
      --accent:       #ff4444;
      --accent-dim:   rgba(255,68,68,0.12);
      --accent-glow:  rgba(255,68,68,0.35);
      --accent-text:  #ff8080;
      --particle-hue: 0;

      --text:   #eeeef5;
      --muted:  rgba(238,238,245,0.38);

      --transition: 0.55s cubic-bezier(.22,1,.36,1);
    }

    /* ── Mood themes ─────────────────────────────────────── */
    .mood-angry   { --accent:#ff3030; --accent-dim:rgba(255,48,48,0.10); --accent-glow:rgba(255,48,48,0.40); --accent-text:#ff9090; --particle-hue:0;   }
    .mood-funny   { --accent:#f9e000; --accent-dim:rgba(249,224,0,0.10); --accent-glow:rgba(249,224,0,0.38); --accent-text:#ffe566; --particle-hue:52;  }
    .mood-sad     { --accent:#4488ff; --accent-dim:rgba(68,136,255,0.10); --accent-glow:rgba(68,136,255,0.38); --accent-text:#88aaff; --particle-hue:220; }
    .mood-sarcastic{ --accent:#b060ff; --accent-dim:rgba(176,96,255,0.10); --accent-glow:rgba(176,96,255,0.35); --accent-text:#cc99ff; --particle-hue:270; }
    .mood-hype    { --accent:#00ffaa; --accent-dim:rgba(0,255,170,0.10); --accent-glow:rgba(0,255,170,0.35); --accent-text:#66ffcc; --particle-hue:155; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Canvas particles ────────────────────────────────── */
    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.6s;
    }

    /* ── Layout ──────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      grid-template-columns: 1fr;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 12px;
    }

    /* ── Header ──────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 4px 10px;
      border-bottom: 1px solid var(--border);
      transition: border-color var(--transition);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-shadow: 0 0 24px var(--accent-glow);
      transition: color var(--transition), text-shadow var(--transition);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pill-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--accent-text);
      background: var(--accent-dim);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 10px;
      border-radius: 999px;
      transition: all var(--transition);
    }
    .icon-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-size: 0.85rem;
    }
    .icon-btn:hover { background: var(--accent-dim); color: var(--accent-text); border-color: var(--accent); }

    /* ── Mood Selector ───────────────────────────────────── */
    #mood-bar {
      display: flex;
      gap: 8px;
      padding: 12px 0 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #mood-bar::-webkit-scrollbar { display: none; }

    .mood-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.08);
      background: var(--panel);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
    }
    .mood-btn::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }
    .mood-btn:hover { transform: translateY(-2px); }

    /* Per-mood button hover colors */
    .mood-btn[data-mood="angry"]::before    { background: radial-gradient(circle at 50% 0%, rgba(255,48,48,0.18), transparent 70%); }
    .mood-btn[data-mood="funny"]::before    { background: radial-gradient(circle at 50% 0%, rgba(249,224,0,0.18), transparent 70%); }
    .mood-btn[data-mood="sad"]::before      { background: radial-gradient(circle at 50% 0%, rgba(68,136,255,0.18), transparent 70%); }
    .mood-btn[data-mood="sarcastic"]::before{ background: radial-gradient(circle at 50% 0%, rgba(176,96,255,0.18), transparent 70%); }
    .mood-btn[data-mood="hype"]::before     { background: radial-gradient(circle at 50% 0%, rgba(0,255,170,0.18), transparent 70%); }
    .mood-btn:hover::before { opacity: 1; }

    .mood-btn.active {
      color: var(--text);
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 18px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .mood-btn.active .mood-emoji {
      filter: drop-shadow(0 0 6px var(--accent-glow));
    }
    .mood-emoji { font-size: 1.1rem; transition: transform 0.3s; }
    .mood-btn:hover .mood-emoji { transform: scale(1.2) rotate(-5deg); }
    .mood-btn.active .mood-emoji { animation: moodPulse 2s ease-in-out infinite; }

    /* ── Chat Area ───────────────────────────────────────── */
    #chat-container {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-dim) transparent;
    }
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-thumb {
      background: var(--accent-dim);
      border-radius: 2px;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0.5;
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.6s both;
    }
    .empty-orb {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      animation: orbFloat 3s ease-in-out infinite;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .empty-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.1em;
      color: var(--accent-text);
      transition: color var(--transition);
    }
    .empty-sub {
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      max-width: 240px;
      line-height: 1.6;
    }

    /* ── Message Bubbles ─────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: msgSlide 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: background var(--transition), box-shadow var(--transition);
    }
    .avatar.bot-avatar {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .avatar.user-avatar {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .bubble {
      max-width: 78%;
      padding: 11px 16px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.65;
      word-break: break-word;
      position: relative;
    }
    .bubble.user {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .bubble.bot {
      background: var(--accent-dim);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 2px solid var(--accent);
      color: var(--text);
      border-bottom-left-radius: 4px;
      transition: background var(--transition), border-color var(--transition);
    }
    .bubble-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 5px;
      display: block;
    }

    /* Typing indicator */
    #typing-row {
      display: none;
      align-items: center;
      gap: 10px;
      animation: msgSlide 0.3s both;
    }
    .typing-bubble {
      background: var(--accent-dim);
      border: 1px solid rgba(255,255,255,0.08);
      border-left: 2px solid var(--accent);
      padding: 12px 16px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex; gap: 5px; align-items: center;
      transition: background var(--transition), border-color var(--transition);
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      transition: background var(--transition);
    }
    .dot:nth-child(1) { animation: typingDot 1.2s 0s ease-in-out infinite; }
    .dot:nth-child(2) { animation: typingDot 1.2s 0.2s ease-in-out infinite; }
    .dot:nth-child(3) { animation: typingDot 1.2s 0.4s ease-in-out infinite; }

    /* ── Input Bar ───────────────────────────────────────── */
    #input-area {
      padding: 10px 4px 20px;
      border-top: 1px solid var(--border);
    }
    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--panel);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #input-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.875rem;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      scrollbar-width: none;
    }
    #msg-input::placeholder { color: var(--muted); }
    #msg-input::-webkit-scrollbar { display: none; }

    #send-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #050510;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s;
      font-size: 1rem;
    }
    #send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--accent-glow); }
    #send-btn:active { transform: scale(0.96); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .input-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      text-align: right;
      margin-top: 5px;
      padding: 0 4px;
    }

    /* ── Mood transition overlay ─────────────────────────── */
    #mood-flash {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
      background: var(--accent);
      transition: opacity 0s;
    }

    /* ── Scrollbar accent ────────────────────────────────── */
    #chat-container {
      scrollbar-color: var(--accent-dim) transparent;
    }

    /* ── Keyframes ───────────────────────────────────────── */
    @keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }
    @keyframes msgSlide  { from { opacity:0; transform: translateY(12px) } to { opacity:1; transform:translateY(0) } }
    @keyframes orbFloat  { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }
    @keyframes moodPulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.15) rotate(5deg) } }
    @keyframes typingDot { 0%,100% { transform: translateY(0); opacity:0.4 } 50% { transform: translateY(-5px); opacity:1 } }
    @keyframes flashIn   { 0% { opacity:0.18 } 100% { opacity:0 } }
    @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)} }

    /* Angry mode: shake message row */
    .mood-angry .bubble.bot { animation: shake 0.35s ease 0.1s; }

    /* Funny mode: bouncy */
    @keyframes boing { 0%{transform:scale(1)} 30%{transform:scale(1.04,-1.04)} 60%{transform:scale(0.97)} 100%{transform:scale(1)} }
    .mood-funny .bubble.bot { animation: boing 0.5s cubic-bezier(.36,.07,.19,.97) 0.05s; }

    /* Sad mode: slow fade-in */
    .mood-sad .msg-row.bot { animation: fadeIn 0.9s both; }

    /* Hype mode: scale bounce */
    @keyframes hypePop { 0%{transform:scale(0.8)} 60%{transform:scale(1.04)} 100%{transform:scale(1)} }
    .mood-hype .bubble.bot { animation: hypePop 0.4s cubic-bezier(.22,1,.36,1) both; }

    /* Copied toast */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent-text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      padding: 7px 18px;
      border-radius: 999px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Mood transition glow ring on avatar */
    .avatar.bot-avatar { transition: all var(--transition); }
  </style>
</head>
<body class="mood-angry">

  <!-- Particle canvas -->
  <canvas id="canvas"></canvas>

  <!-- Mood flash overlay -->
  <div id="mood-flash"></div>

  <!-- Toast -->
  <div id="toast">Copied!</div>

  <div id="app">

    <!-- ── HEADER ───────────────────────────────────────── -->
    <header id="header">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="logo">MoodBot</div>
        <span class="pill-badge" id="model-badge">mistral-small-2506</span>
      </div>
      <div class="header-right">
        <span class="pill-badge" id="mood-badge">😡 ANGRY</span>
        <button class="icon-btn" onclick="exportChat()" title="Export chat">💾</button>
        <button class="icon-btn" onclick="clearChat()" title="Clear chat">🗑</button>
      </div>
    </header>

    <!-- ── MOOD SELECTOR ─────────────────────────────────── -->
    <div id="mood-bar">
      <button class="mood-btn active" data-mood="angry"     onclick="setMood(this)"><span class="mood-emoji">😡</span> Angry</button>
      <button class="mood-btn"        data-mood="funny"     onclick="setMood(this)"><span class="mood-emoji">😂</span> Funny</button>
      <button class="mood-btn"        data-mood="sad"       onclick="setMood(this)"><span class="mood-emoji">😢</span> Sad</button>
      <button class="mood-btn"        data-mood="sarcastic" onclick="setMood(this)"><span class="mood-emoji">🙄</span> Sarcastic</button>
      <button class="mood-btn"        data-mood="hype"      onclick="setMood(this)"><span class="mood-emoji">🚀</span> Hype</button>
    </div>

    <!-- ── CHAT AREA ─────────────────────────────────────── -->
    <div id="chat-container">

      <!-- Empty state -->
      <div id="empty-state">
        <div class="empty-orb" id="orb-emoji">😡</div>
        <div class="empty-title">Pick a mood, start a conversation</div>
        <div class="empty-sub">5 distinct emotional personas powered by Mistral AI. Each one is delightfully unhinged.</div>
      </div>

      <!-- Typing indicator (hidden by default) -->
      <div id="typing-row" class="msg-row bot">
        <div class="avatar bot-avatar" id="typing-avatar">🤖</div>
        <div class="typing-bubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

    </div>

    <!-- ── INPUT ─────────────────────────────────────────── -->
    <div id="input-area">
      <div id="input-row">
        <textarea
          id="msg-input"
          rows="1"
          placeholder="Say something to the bot…"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">➤</button>
      </div>
      <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; Click bubble to copy</div>
    </div>

  </div>



<script>
// ── State ──────────────────────────────────────────────────────────────────────
const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2, 10);
let currentMood = 'angry';
let isStreaming  = false;
let msgCount     = 0;

const MOOD_META = {
  angry:     { emoji:'😡', label:'ANGRY',     color:'#ff3030' },
  funny:     { emoji:'😂', label:'FUNNY',     color:'#f9e000' },
  sad:       { emoji:'😢', label:'SAD',       color:'#4488ff' },
  sarcastic: { emoji:'🙄', label:'SARCASTIC', color:'#b060ff' },
  hype:      { emoji:'🚀', label:'HYPE',      color:'#00ffaa' },
};

// ── Particle System ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x  = Math.random() * W;
    this.y  = init ? Math.random() * H : H + 10;
    this.r  = Math.random() * 1.8 + 0.4;
    this.sp = Math.random() * 0.5 + 0.15;
    this.op = Math.random() * 0.5 + 0.1;
    this.drift = (Math.random() - 0.5) * 0.4;
  }
  update() {
    this.y  -= this.sp;
    this.x  += this.drift;
    if (this.y < -10) this.reset(false);
  }
  draw(rgb) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${this.op})`;
    ctx.fill();
  }
}

function initParticles() {
  particles = Array.from({length: 80}, () => new Particle());
}

let targetRgb = hexToRgb('#ff3030');
let currentRgb = {...targetRgb};

function lerpRgb(a, b, t) {
  return { r: a.r + (b.r-a.r)*t, g: a.g + (b.g-a.g)*t, b: a.b + (b.b-a.b)*t };
}

function animParticles() {
  ctx.clearRect(0, 0, W, H);
  currentRgb = lerpRgb(currentRgb, targetRgb, 0.04);
  const intRgb = { r:Math.round(currentRgb.r), g:Math.round(currentRgb.g), b:Math.round(currentRgb.b) };
  particles.forEach(p => { p.update(); p.draw(intRgb); });
  requestAnimationFrame(animParticles);
}

// ── Mood Switch ────────────────────────────────────────────────────────────────
function setMood(btn) {
  const mood = btn.dataset.mood;
  if (mood === currentMood) return;

  currentMood = mood;
  const meta  = MOOD_META[mood];

  // Update body class
  document.body.className = `mood-${mood}`;

  // Update active button
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Update badge + orb
  document.getElementById('mood-badge').textContent = `${meta.emoji} ${meta.label}`;
  document.getElementById('orb-emoji').textContent  = meta.emoji;
  document.querySelectorAll('.bot-avatar').forEach(a => a.textContent = meta.emoji);

  // Update particle target color
  targetRgb = hexToRgb(meta.color);

  // Flash overlay
  const flash = document.getElementById('mood-flash');
  flash.style.transition = 'none';
  flash.style.opacity = '0.12';
  setTimeout(() => {
    flash.style.transition = 'opacity 0.5s ease-out';
    flash.style.opacity = '0';
  }, 50);

  // Reset conversation with new mood (backend resets on system prompt change)
  clearChatUI();
}

// ── DOM helpers ────────────────────────────────────────────────────────────────
function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function showEmpty(v) {
  document.getElementById('empty-state').style.display = v ? 'flex' : 'none';
}

function showTyping(v) {
  const row = document.getElementById('typing-row');
  row.style.display = v ? 'flex' : 'none';
  if (v) {
    document.getElementById('typing-avatar').textContent = MOOD_META[currentMood].emoji;
    scrollBottom();
  }
}

function scrollBottom() {
  const c = document.getElementById('chat-container');
  setTimeout(() => c.scrollTo({top: c.scrollHeight, behavior:'smooth'}), 60);
}

function appendMessage(role, text) {
  if (msgCount === 0) showEmpty(false);
  msgCount++;

  const container = document.getElementById('chat-container');
  const typingRow  = document.getElementById('typing-row');

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'avatar bot-avatar';
    av.textContent = MOOD_META[currentMood].emoji;
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = formatText(text);

  const time = document.createElement('span');
  time.className = 'bubble-time';
  time.textContent = getTime();
  bubble.appendChild(time);

  // Copy on click
  bubble.title = 'Click to copy';
  bubble.style.cursor = 'pointer';
  bubble.addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
  });

  row.appendChild(bubble);

  if (role === 'user') {
    const av = document.createElement('div');
    av.className = 'avatar user-avatar';
    av.textContent = '🧑';
    row.appendChild(av);
  }

  container.insertBefore(row, typingRow);
  scrollBottom();
  return bubble;
}

function formatText(txt) {
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.82em">$1</code>')
    .replace(/\n/g, '<br/>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Send Message ───────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value  = '';
  inp.style.height = 'auto';
  appendMessage('user', text);

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  showTyping(true);

  try {
    const res = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID, message: text, mood: currentMood })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Server error');
    }

    showTyping(false);

    // Create bot bubble for streaming
    const botBubble = appendMessage('bot', '');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n');
      buf = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;

        let payload;
        try { payload = JSON.parse(raw); } catch { continue; }

        if (payload.error) {
          fullText = '⚠️ ' + payload.error;
          botBubble.innerHTML = formatText(fullText);
          break;
        }
        if (payload.token) {
          fullText += payload.token;
          // Re-render, but keep time element
          const timeEl = botBubble.querySelector('.bubble-time');
          botBubble.innerHTML = formatText(fullText);
          if (timeEl) botBubble.appendChild(timeEl);
          scrollBottom();
        }
        if (payload.done) break;
      }
    }
  } catch (err) {
    showTyping(false);
    appendMessage('bot', '⚠️ Error: ' + err.message);
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

// ── Clear ──────────────────────────────────────────────────────────────────────
function clearChatUI() {
  const container = document.getElementById('chat-container');
  const typingRow  = document.getElementById('typing-row');
  // Remove all msg-rows except typing-row and empty-state
  container.querySelectorAll('.msg-row:not(#typing-row)').forEach(r => r.remove());
  msgCount = 0;
  showEmpty(true);
}

async function clearChat() {
  clearChatUI();
  try {
    await fetch('/chat/clear', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: SESSION_ID})
    });
  } catch (_) {}
  showToast('Chat cleared');
}

// ── Export ─────────────────────────────────────────────────────────────────────
function exportChat() {
  const rows = document.querySelectorAll('.msg-row:not(#typing-row)');
  if (!rows.length) { showToast('Nothing to export'); return; }

  let txt = `MoodBot Export — Mood: ${currentMood.toUpperCase()}\n`;
  txt += `Session: ${SESSION_ID}\n`;
  txt += `Date: ${new Date().toLocaleString()}\n\n`;
  txt += '─'.repeat(40) + '\n\n';

  rows.forEach(row => {
    const isUser = row.classList.contains('user');
    const bubble = row.querySelector('.bubble');
    const timeEl = bubble.querySelector('.bubble-time');
    const timeTxt = timeEl?.textContent || '';
    const content = bubble.textContent.replace(timeTxt, '').trim();
    txt += `[${timeTxt}] ${isUser ? 'YOU' : 'BOT'}: ${content}\n\n`;
  });

  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `moodbot_${currentMood}_${Date.now()}.txt`;
  a.click();
  showToast('Exported!');
}

// ── Auto-resize textarea ────────────────────────────────────────────────────────
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();
initParticles();
animParticles();
</script>
